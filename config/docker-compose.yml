version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smail-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-smail_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smail_password}
      POSTGRES_DB: ${DB_NAME:-smail_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smail_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smail-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smail-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smail-net

  # ML API Server
  ml-api:
    build:
      context: ./ml-engine/core/predictive
      dockerfile: Dockerfile
    container_name: smail-ml-api
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      WORKERS: 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - smail-net

  # Backend API (4 replicas for load balancing)
  backend-1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smail-backend-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_USER: ${DB_USER:-smail_user}
      DB_PASSWORD: ${DB_PASSWORD:-smail_password}
      DB_NAME: ${DB_NAME:-smail_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_API_HOST: ml-api
      ML_API_PORT: 5001
      NUM_WORKERS: 2
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      JWT_SECRET: ${JWT_SECRET:-jwt-secret}
    volumes:
      - ./backend:/app/backend
    networks:
      - smail-net
    restart: unless-stopped

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smail-backend-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_USER: ${DB_USER:-smail_user}
      DB_PASSWORD: ${DB_PASSWORD:-smail_password}
      DB_NAME: ${DB_NAME:-smail_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_API_HOST: ml-api
      ML_API_PORT: 5001
      NUM_WORKERS: 2
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      JWT_SECRET: ${JWT_SECRET:-jwt-secret}
    volumes:
      - ./backend:/app/backend
    networks:
      - smail-net
    restart: unless-stopped

  backend-3:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smail-backend-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_USER: ${DB_user:-smail_user}
      DB_PASSWORD: ${DB_PASSWORD:-smail_password}
      DB_NAME: ${DB_NAME:-smail_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_API_HOST: ml-api
      ML_API_PORT: 5001
      NUM_WORKERS: 2
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      JWT_SECRET: ${JWT_SECRET:-jwt-secret}
    volumes:
      - ./backend:/app/backend
    networks:
      - smail-net
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: smail-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    networks:
      - smail-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  smail-net:
    driver: bridge
